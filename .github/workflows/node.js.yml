name: Node.js CI

on:
  push:
    branches: [ "main" ]
jobs:
  build:

    runs-on: self-hosted

    # strategy:
    #   matrix:
    #     node-version: [22.5.1]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    # - name: Use Node.js ${{ matrix.node-version }}
      # uses: actions/setup-node@v4
      # with:
      #   node-version: ${{ matrix.node-version }}
      #   cache: 'npm'
    # - run: npm ci
    # - run: npm install
    - run: npm install
    - name: Create .env file
      run: |
        touch .env
        echo "SECRET=${{ secrets.SUMARG_SECRET }}" >> .env
    - name: Restart app with PM2
      run: |
        pm2 reload index.js || pm2 start index.js
